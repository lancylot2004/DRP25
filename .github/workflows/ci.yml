name: CI
on: [push, pull_request]

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: latest-stable
      - name: Setup Java JDK
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '23'
          distribution: 'temurin'
      - name: Check Tests
        run: "./gradlew test"
  deploy-release:
    name: Deploy Releases
    runs-on: macos-latest
    if: github.ref == 'refs/heads/master'
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: latest-stable
      - name: Setup Java JDK
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '23'
          distribution: 'temurin'
      - name: Build Android APK
        env:
          ANDROID_STORE_PASS = ${{ secrets.STORE_PASSWORD }}
          ANDROID_KEY_ALIAS = ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASS = ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease
      - name: Release in GitHub
        uses: softprops/action-gh-release@v2.2.2
        with:
          files: |
            shared/build/outputs/apk/release/shared-release.apk
            iosApp/build/export/*.ipa


